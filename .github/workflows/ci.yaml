name: Full CI/CD Pipeline
on:
    push:
        branches: [ main ]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Set Image Tag
              run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

            - name: Build Docker image
              run: docker build -t ${{ vars.DOCKER_USERNAME }}/cicd-demo:${{ env.IMAGE_TAG }} .

            - name: Push Docker image
              run: docker push ${{ vars.DOCKER_USERNAME }}/cicd-demo:${{ env.IMAGE_TAG }}
              
            - name: Deploy to EC2
                uses: appleboy/ssh-action@v1.0.3
                with:
                    host: ${{ secrets.EC2_HOST }}
                    username: ${{ secrets.EC2_USERNAME }}
                    key: ${{ secrets.EC2_SSH_KEY }}
                    script: |
                        docker pull ${{ vars.DOCKER_USERNAME }}/cicd-demo:${{ env.IMAGE_TAG }}
                        docker stop cicdapp || true
                        docker rm cicdapp || true
                        docker run -d --name cicdapp -p 80:3000 ${{ vars.DOCKER_USERNAME }}/cicd-demo:${{ env.IMAGE_TAG }}